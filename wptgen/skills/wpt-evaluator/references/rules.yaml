  # ─── focus ──────────────────────────────────────────────────────────────

  - id: FOCUS-001
    source: wpt/docs/writing-tests/general-guidelines.md#L99-L106
    category: focus
    applies_to: [html, js, testharness, reftest]
    severity: warn
    layer: semantic
    rule: |
      Tests should be as short as possible. Extraneous elements on the
      page should be avoided so it is clear what is part of the test.
      For reftests at 800x600, scrollbars must be avoided unless
      scrolling itself is being tested.
    cite: >
      Tests should be as short as possible. For reftests in particular
      scrollbars at 800x600px window size must be avoided unless scrolling
      behavior is specifically being tested. For all tests extraneous
      elements on the page should be avoided so it is clear what is part
      of the test.

  - id: FOCUS-002
    source: wpt/docs/writing-tests/general-guidelines.md#L109-L127
    category: focus
    applies_to: [html, js, testharness, reftest]
    severity: warn
    layer: semantic
    rule: |
      Tests should avoid depending on edge-case behavior of features they
      don't intend to test, and should not contain parse errors (except
      where parsing is the subject). Tests should not rely on features
      that aren't supported in the latest stable release of Safari,
      Chrome, and Firefox unless that feature is the one being tested.
    cite: >
      Tests should generally avoid depending on edge case behavior of
      features that they don't explicitly intend on testing. ... Tests
      should not rely on unrelated features if doing so causes failures in
      the latest stable release of Apple Safari, Google Chrome, or Mozilla
      Firefox.

  - id: FOCUS-003
    source: wpt/docs/writing-tests/general-guidelines.md#L170-L174
    category: focus
    applies_to: [html, js, testharness, reftest, manual]
    severity: warn
    layer: semantic
    rule: |
      Tests should be self-describing: it should be obvious when they
      pass and when they fail without consulting the specification.
    cite: >
      Tests should make it obvious when they pass and when they fail. It
      shouldn't be necessary to consult the specification to figure out
      whether a test has passed of failed.

  - id: FOCUS-004
    source: wpt/docs/writing-tests/general-guidelines.md#L121-L127
    category: focus
    applies_to: [html, js, testharness, reftest]
    severity: warn
    layer: semantic
    rule: |
      Tests should pass when the feature under test exposes the expected
      behavior, and fail when the feature is not implemented or
      implemented incorrectly.
    cite: >
      Tests should pass when the feature under test exposes the expected
      behavior, and they should fail when the feature under test is not
      implemented or is implemented incorrectly.

  - id: FOCUS-005
    source: wpt/docs/writing-tests/manual.md#L6-L13
    category: focus
    applies_to: [manual]
    severity: warn
    layer: semantic
    rule: |
      Manual tests should be a last resort; automated tests are
      significantly more useful for catching regressions. Use a manual
      test only when automation is not yet possible.
    cite: >
      Whenever possible it's best to write a fully automated test. ... This
      makes them [manual tests] significantly less useful for catching
      regressions than automated tests.

